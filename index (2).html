<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* Navbar */
nav {
    background: black;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: red;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 50px;
}

.hero img {
    width: 80%;
    max-width: 600px;
    border-radius: 10px;
}

/* Video Section */
.video-section {
    text-align: center;
    padding: 40px;
}

video {
    width: 80%;
    max-width: 600px;
    border-radius: 10px;
}

/* Button */
button {
    padding: 10px 20px;
    background: red;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkred;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Contact</a>
</nav>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to Car World</h1>
    <p>Explore the best cars</p>

    <img src="C:\Users\Maitrav\OneDrive\Pictures\audi-r26-concept-8k-7680x4320-24660.jpg"alt="Car Image">

    <br><br>
    <button onclick="showMessage()">Click Me</button>
</div>

<!-- Video Section -->
<div class="video-section">
    <h2>Car Video</h2>

    <video controls>
        <source src="C:\Users\Maitrav\Videos\88481-606110665.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Car Website</p>
</footer>

<!-- JavaScript -->
<script>
function showMessage() {
    alert("Welcome to Car Website 🚗");
}
</script>

</body>
</html>
